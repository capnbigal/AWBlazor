version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      mudblazor:
        patterns:
          - "MudBlazor*"
      serilog:
        patterns:
          - "Serilog*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
