name: Build & Test

on:
  pull_request: {}
  push:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AWBlazorApp.slnx

      - name: Build
        run: dotnet build AWBlazorApp.slnx --no-restore

      - name: Test
        run: dotnet test AWBlazorApp.slnx --no-build --verbosity normal
