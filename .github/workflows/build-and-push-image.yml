name: Build & push Docker image

# Builds the production Docker image on every push to main and publishes it to
# GitHub Container Registry (ghcr.io/capnbigal/awblazor). The droplet pulls from
# this registry instead of building locally, which keeps the small VM from
# OOM-killing itself during the .NET publish step.
#
# Tags published per build:
#   - latest             always points at the newest main build
#   - <short-sha>        immutable per-commit tag for clean rollbacks
#
# Manual trigger (workflow_dispatch) lets you re-publish without a new commit
# (e.g. after rotating a base-image vulnerability).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository is "owner/repo" — metadata-action lowercases it
          # automatically so the image lands at ghcr.io/capnbigal/awblazor.
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps NuGet restore + earlier layers warm
          # between runs so builds after the first one are fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
