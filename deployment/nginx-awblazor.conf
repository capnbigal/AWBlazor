# /etc/nginx/sites-available/awblazor.conf
#
# Reverse-proxy config for AWBlazor running on 127.0.0.1:8080 inside a
# Docker container. WebSocket upgrade headers are REQUIRED — Blazor Server
# uses SignalR for the interactive circuit, which runs over WebSockets.
#
# Install:
#   sudo cp /opt/awblazor/deployment/nginx-awblazor.conf /etc/nginx/sites-available/awblazor.conf
#   sudo ln -s /etc/nginx/sites-available/awblazor.conf /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/<old-template>       # only after testing!
#   sudo nginx -t
#   sudo systemctl reload nginx

# Upgrade mapping for WebSocket support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name alibalib.com www.alibalib.com;

    # Let's Encrypt challenge (keep this passthrough for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alibalib.com www.alibalib.com;

    # Existing Let's Encrypt certs — unchanged from template site
    ssl_certificate     /etc/letsencrypt/live/alibalib.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alibalib.com/privkey.pem;
    # NOTE: ssl_protocols / ssl_prefer_server_ciphers are set globally in
    # /etc/nginx/nginx.conf. If certbot's Mozilla-recommended snippet
    # (/etc/letsencrypt/options-ssl-nginx.conf) and a dhparams file exist,
    # you can add the two corresponding `include` / `ssl_dhparam` lines here
    # as defense-in-depth — omitted by default since not all droplets have them.

    # Security headers (app also sets these, but Nginx layer adds defense-in-depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size — bump if you need larger forecast imports or uploads
    client_max_body_size 25m;

    # Timeouts suited to a SignalR circuit (Blazor Server keeps connections open)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Proxy everything to the container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade — REQUIRED for Blazor Server
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Preserve original request headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_cache_bypass $http_upgrade;
    }

    # Hangfire dashboard is admin-gated by the app; Nginx just passes through.
    # API endpoints inherit the same proxy rules via the root location above.

    # Block sensitive paths from being proxied (if any exist outside the app)
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }
}
