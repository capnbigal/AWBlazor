name: awblazor

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: awblazor-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?set SA_PASSWORD in .env}"
      MSSQL_PID: Developer
      MSSQL_COLLATION: SQL_Latin1_General_CP1_CI_AS
      # Cap SQL Server's max server memory at 2 GB. Without this, SQL Server tries to grow
      # to all available RAM and starves the OS / app container during the brief moment when
      # both old and new app containers are alive during a `docker compose up -d --force-recreate`.
      # That spike OOM'd SQL Server on the 4 GB DigitalOcean droplet on 2026-04-19 (Error 701,
      # "insufficient system memory in resource pool 'internal'"). 2 GB leaves comfortable room
      # for the OS (~500 MB), Docker overhead (~200 MB), and the app container (~600 MB) on a
      # 4 GB droplet. Tune up if you move to a bigger droplet.
      MSSQL_MEMORY_LIMIT_MB: "${MSSQL_MEMORY_LIMIT_MB:-2048}"
    ports:
      # Bind to localhost only. Public access is deliberately blocked — use `ufw deny 1433`
      # on the host as defense-in-depth.
      - "127.0.0.1:1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./backups:/backups
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    # Pulled from GitHub Container Registry — built and pushed by
    # .github/workflows/build-and-push-image.yml on every push to main.
    # APP_TAG defaults to "latest" but you can pin to a specific commit SHA
    # for rollbacks: APP_TAG=a1b2c3d docker compose up -d app
    image: ghcr.io/capnbigal/awblazor:${APP_TAG:-latest}
    container_name: awblazor-app
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      # Connection string — overrides appsettings.json DefaultConnection.
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AdventureWorks2022;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
      # Feature flags (override as needed).
      Features__Hangfire: "true"
      Features__RateLimiting: "true"
      # Demo convenience: when true, /Account/Login prefills the seed admin creds.
      # Flip via DEMO_AUTOFILL_LOGIN in .env + `docker compose up -d app`. Never true in real prod.
      Demo__AutofillLogin: "${DEMO_AUTOFILL_LOGIN:-false}"
      # Demo convenience: when true, AdventureWorks business dates get shifted forward on
      # startup (and by the Admin "Shift dates to today" button) so the 2011-2014 sample looks
      # current. Mirrors Demo__AutofillLogin. Never true in real prod.
      Demo__ShiftDates: "${DEMO_SHIFT_DATES:-false}"
      # SMTP (set in .env on the droplet).
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-noreply@alibalib.com}"
      Smtp__FromName: "${SMTP_FROM_NAME:-AWBlazor}"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - appdata:/app/App_Data
    restart: unless-stopped

volumes:
  sqldata:
    name: awblazor-sqldata
  appdata:
    name: awblazor-appdata
